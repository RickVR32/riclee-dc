<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Assessment · Riclee Digital</title>
    <meta name="description" content="Psychometric assessment and observer reports. Structured awareness profiling powered by a proprietary framework."/>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cormorant:wght@300;400&family=Geist+Mono:wght@300;400&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #080808;
            --bg-soft: #111111;
            --panel: #161616;
            --panel-border: rgba(255,255,255,0.07);
            --line: rgba(255,255,255,0.06);
            --line-strong: rgba(255,255,255,0.15);
            --text: #f0f0ee;
            --muted: #666660;
            --dim: #333330;
            --input-bg: #111111;
            --narc: #C4622D;
            --yarc: #1D9E75;
            --cist: #534AB7;
            --oll: #A0426B;
            --mono: 'Space Mono', monospace;
            --serif: 'DM Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            background-image: linear-gradient(180deg, rgba(255,255,255,0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px); 
            background-size: 44px 44px; 
            color: var(--text); 
            font-family: var(--mono); 
            font-weight: 300; 
            -webkit-font-smoothing: antialiased; 
            min-height: 100vh; 
        }

        .container { width: min(1240px, calc(100% - 48px)); margin: auto; }
        
        nav { padding: 18px 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); }
        .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo span { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
        .nav-right { display: flex; align-items: center; gap: 14px; }
        .nav-back { font-size: 0.66rem; letter-spacing: 0.12em; color: var(--muted); text-decoration: none; text-transform: uppercase; }
        .nav-back:hover { color: var(--text); }
        
        .assess-layout { display: grid; grid-template-columns: 1fr 460px; min-height: calc(100vh - 63px); }
        .diagram-col { border-right: 1px solid var(--line); padding: 32px; display: flex; flex-direction: column; gap: 24px; position: sticky; top: 63px; height: calc(100vh - 63px); }
        .diag-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
        
        .q-col { display: flex; flex-direction: column; height: calc(100vh - 63px); position: sticky; top: 63px; overflow-y: auto; padding: 32px; background: var(--bg-soft); }
        
        .oc-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .oc-field-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
        .oc-input { font-family: var(--mono); font-weight: 300; font-size: 0.85rem; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--line-strong); background: var(--input-bg); color: var(--text); outline: none; width: 100%; }
        .oc-input:focus { border-color: var(--text); }
        
        .btn-primary { font-family: var(--mono); font-weight: 400; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; background: var(--text); color: var(--bg); padding: 14px 28px; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; width: 100%; }
        .btn-primary:hover { opacity: 0.85; }

        .metric-badge { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        .results-box { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px; padding: 24px; margin-top: 24px; display: none; }
        .cta-banner { background: linear-gradient(90deg, #1e293b, #0f172a); border: 1px solid var(--line-strong); padding: 20px; border-radius: 8px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="/" class="nav-logo">
                <span>Source Code Holdings Ltd</span>
            </a>
            <div class="nav-right">
                <a href="https://riclee-dc.info" class="nav-back">Framework Hub</a>
            </div>
        </nav>

        <div class="assess-layout">
            <!-- LEFT COLUMN: REAL-TIME GRAPH ARCHITECTURE -->
            <div class="diagram-col">
                <div class="diag-label">Real-Time Metric Topology</div>
                
                <!-- Dynamic Diagnostic Visual Dashboard Feedback Panels -->
                <div class="border border-zinc-800 p-4 rounded-lg bg-zinc-900/50 mt-4">
                    <p class="text-[10px] uppercase text-zinc-500 tracking-wider">Calculated Drift Index</p>
                    <div id="live-drift" class="text-4xl font-bold font-mono text-zinc-400 mt-1">0.0</div>
                </div>

                <div class="border border-zinc-800 p-4 rounded-lg bg-zinc-900/50">
                    <p class="text-[10px] uppercase text-zinc-500 tracking-wider">Confidence Engine Metric</p>
                    <div id="live-confidence" class="text-xl font-bold font-mono text-zinc-500 mt-1">--</div>
                </div>

                <div class="border border-zinc-800 p-4 rounded-lg bg-zinc-900/50">
                    <p class="text-[10px] uppercase text-zinc-500 tracking-wider">Authenticity Divergence Index (ADI)</p>
                    <div id="live-adi" class="text-xl font-bold font-mono text-zinc-500 mt-1">--</div>
                </div>
            </div>

            <!-- RIGHT COLUMN: INTERACTIVE QUESTIONNAIRE CONTROL CONTAINER -->
            <div class="q-col">
                <div class="diag-label" style="margin-bottom: 24px;">Diagnostic Interface v3.0</div>

                <div class="oc-field">
                    <label class="oc-field-label">Client Email Endpoint</label>
                    <input type="email" id="client-email" class="oc-input" placeholder="name@domain.com"/>
                </div>

                <div class="oc-field">
                    <label class="oc-field-label">Interaction Context</label>
                    <select id="sch-context" class="oc-input" style="appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23666660%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%3E%3C%2Fpath%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 10px auto;">
                        <option value="1.4">Romantic Engagement (Weight: 1.4)</option>
                        <option value="1.3">Family Structural Loop (Weight: 1.3)</option>
                        <option value="1.1" selected>Workplace Alignment (Weight: 1.1)</option>
                        <option value="0.8">Public External Dynamic (Weight: 0.8)</option>
                    </select>
                </div>

                <!-- Input Score Form Fields Matrix Blocks -->
                <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 14px;">
                    <div class="oc-field">
                        <label class="oc-field-label" style="color: var(--narc);">Projection Scalar (1-5)</label>
                        <input type="number" id="sch-proj" min="1" max="5" value="3" class="oc-input">
                    </div>
                    <div class="oc-field">
                        <label class="oc-field-label" style="color: var(--narc);">Deflection Scalar (1-5)</label>
                        <input type="number" id="sch-defl" min="1" max="5" value="2" class="oc-input">
                    </div>
                    <div class="oc-field">
                        <label class="oc-field-label" style="color: var(--oll);">Conversational Instability Vector (1-5)</label>
                        <input type="number" id="sch-inst" min="1" max="5" value="2" class="oc-input">
                    </div>
                    <div class="oc-field">
                        <label class="oc-field-label" style="color: var(--yarc);">Accountability / Regulation Coeff (1-5)</label>
                        <input type="number" id="sch-acc" min="1" max="5" value="2" class="oc-input">
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <button onclick="executeABRCalculation()" class="btn-primary">Process Matrix Nodes</button>
                </div>

                <!-- RESULTS UI OUTPUT INNER WRAPPER CONTAINER -->
                <div id="results-panel" class="results-box">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                        <div>
                            <span class="oc-field-label">Target Dynamic Grouping</span>
                            <div id="results-class" class="metric-badge" style="background: var(--cist); color: #fff;">Stable Alignment</div>
                        </div>
                    </div>
