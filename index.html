<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ric Lee | Digital Consultancy</title>
  <meta name="description" content="Riclee Digital — web development, software development, automation, digital design, and psychometric assessment. Built by Source Code Holdings." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">

  <script>
    (function(){
      var t = localStorage.getItem('riclee-theme') || 'light';
      if (t === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>

  <style>
    /* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
    :root {
      --bg: #f5f5f5; --bg-soft: #ffffff; --panel: rgba(0,0,0,0.03);
      --text: #111111; --muted: #5f6470;
      --accent: #4f46e5;
      --line: rgba(0,0,0,0.08);
      --accent-soft: rgba(79,70,229,0.10);
      --accent-border: rgba(79,70,229,0.3);
      --shadow: 0 18px 50px rgba(0,0,0,0.08);
      --radius: 24px;
      --radius-lg: 30px;
    }

    html.dark {
      --bg: #0a0a0a; --bg-soft: #111111;
      --text: #f5f5f5; --muted: #a1a1aa;
      --accent: #84cc16;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Geist Mono', monospace;
      background:var(--bg);
      color:var(--text);
    }

    .container{width:min(1220px, calc(100% - 40px));margin:0 auto;}

    /* ===== FORM ===== */
    .form-card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:30px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .field-full{grid-column:1/-1;}

    input,select,textarea{
      width:100%;
      min-height:48px;
      border-radius:12px;
      border:1px solid var(--line);
      padding:12px;
      background:transparent;
      color:var(--text);
    }

    textarea{min-height:120px;}

    label{
      font-size:0.7rem;
      text-transform:uppercase;
      color:var(--muted);
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 20px;
      border-radius:999px;
      border:1px solid var(--line);
      cursor:pointer;
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .submit-row{
      grid-column:1/-1;
      display:flex;
      gap:12px;
      align-items:center;
      margin-top:10px;
    }

    .submit-note{
      font-size:0.75rem;
      color:var(--muted);
    }

    .form-status{
      grid-column:1/-1;
      display:none;
      padding:12px;
      border-radius:10px;
    }

    .form-status.is-visible{display:block;}
    .form-status.is-success{background:rgba(34,197,94,0.1);color:#16a34a;}
    .form-status.is-error{background:rgba(239,68,68,0.1);color:#dc2626;}
  </style>
</head>

<body>

<main>

<section id="enquiry">
  <div class="container">

    <div class="form-card">

      <!-- ✅ FORMSPREE CONNECTION -->
      <form id="rl-enquiry-form"
            action="https://formspree.io/f/mreorpre"
            method="POST">

        <div class="form-grid">

          <div id="formStatus" class="form-status"></div>

          <div class="field">
            <label>Name</label>
            <input name="name" type="text" required>
          </div>

          <div class="field">
            <label>Contact</label>
            <input name="contact" type="text" required>
          </div>

          <div class="field">
            <label>Service</label>
            <select name="service">
              <option>Web Development</option>
              <option>Design / POD</option>
              <option>Software / Automation</option>
              <option>CAD Design</option>
              <option>3D Printing</option>
              <option>VAG Coding</option>
              <option>VAG Remapping</option>
              <option>Psychometric Assessment</option>
              <option>Other</option>
            </select>
          </div>

          <div class="field">
            <label>Priority</label>
            <select name="priority">
              <option>Standard</option>
              <option>Urgent</option>
              <option>Time-Sensitive</option>
            </select>
          </div>

          <div class="field-full">
            <label>Project Details</label>
            <textarea name="message" required></textarea>
          </div>

          <!-- optional extras -->
          <input type="hidden" name="_subject" value="New Riclee Enquiry">

          <div class="submit-row">
            <button class="btn btn-primary" type="submit">
              Submit enquiry
            </button>
            <span class="submit-note">Sent securely via Formspree</span>
          </div>

        </div>
      </form>

    </div>

  </div>
</section>

</main>

<script>
  // Optional UX feedback (Formspree redirect-less handling)
  const form = document.getElementById('rl-enquiry-form');
  const status = document.getElementById('formStatus');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = form.querySelector('button');
    btn.disabled = true;
    btn.textContent = "Sending...";

    try {
      const res = await fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        status.className = "form-status is-visible is-success";
        status.textContent = "Enquiry sent successfully.";
        form.reset();
      } else {
        throw new Error();
      }

    } catch (err) {
      status.className = "form-status is-visible is-error";
      status.textContent = "Something went wrong. Please try again.";
    }

    btn.disabled = false;
    btn.textContent = "Submit enquiry";
  });
</script>

</body>
</html>
